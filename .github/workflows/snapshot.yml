name: Daily price snapshot

on:
  schedule:
    # Daily at 09:00 KST.
    - cron: '0 0 * * *'
  workflow_dispatch: {}

concurrency:
  group: daily-price-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - name: Run snapshot
        # Uses public duty-free search pages only; no Netlify environment variables are required.
        run: npm run snapshot
        timeout-minutes: 10
      - name: Commit updated prices
        if: always()
        id: commit
        run: |
          git config user.name "dfmoa-bot"
          git config user.email "bot@dfmoa.local"
          git add data/prices/ data/history/ data/last-error.json
          if git diff --cached --quiet; then
            echo "No changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(snapshot): $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger Netlify deploy hook
        if: always() && steps.commit.outputs.changed == 'true'
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK_URL" ]; then
            echo "No NETLIFY_BUILD_HOOK_URL secret configured; relying on Netlify Git deploy."
            exit 0
          fi

          curl -fsS -X POST "$NETLIFY_BUILD_HOOK_URL"
